spring:
  application:
    name: my-ai-app
  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        api-key: ${GROQ_API_KEY}
        base-url: https://api.groq.com/openai
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.7
          max-tokens: 8000

  datasource:
    url: jdbc:h2:mem:springAiDatabase
    driverClassName: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080
